    <div class="container mt-5">

                <!--DATUAK=>-->
				<form 
				  action="mailto:betxeberria24@izarraitz.eus" 
				  method="post" 
				  enctype="text/plain"
				  class="needs-validation" 
				  novalidate
				>
				  <div class="mb-3">
					<label for="nombre" class="form-label">Izen-abizenak</label>
					<input type="text" class="form-control" id="nombre" name="Izen-abizenak" required>
					<div class="invalid-feedback">Eremu hau bete behar da.</div>
				  </div>

				  <div class="mb-3">
					<label for="email" class="form-label">Posta elektronikoa</label>
					<input type="email" class="form-control" id="email" name="Email" required>
					<div class="invalid-feedback">Posta elektroniko zuzena idatzi.</div>
				  </div>

				  <div class="mb-3">
					<label for="telefono" class="form-label">Telefonoa</label>
					<input type="tel" class="form-control" id="telefono" name="Telefonoa">
				  </div>

				  <div class="mb-3 form-check">
					<input type="checkbox" class="form-check-input" id="datuak" name="Baimena" value="Bai" required>
					<label class="form-check-label" for="datuak">
					  Nire datuak inkestetarako erabiltzeko baimena ematen dut
					</label>
					<div class="invalid-feedback">Baimena beharrezkoa da.</div>
				  </div>

				  <div class="mb-3">
					<label for="arrazoia" class="form-label">Arrazoia</label>
					<select class="form-select" id="arrazoia" name="Arrazoia" required>
					  <option value="" selected disabled>Aukeratu arrazoia...</option>
					  <option value="Kexa">Kexa</option>
					  <option value="Eskaera">Eskaera</option>
					  <option value="Informazioa">Informazioa</option>
					  <option value="Beste bat">Beste bat</option>
					</select>
					<div class="invalid-feedback">Aukeratu arrazoia bat mesedez.</div>
				  </div>

				  <div class="mb-3">
					<label for="udalerria" class="form-label">Udalerria / Probintzia</label>
					<select class="form-select" id="udalerria" name="Udalerria" required>
					  <option value="" selected disabled>Aukeratu...</option>
					  <option value="Gipuzkoa">Gipuzkoa</option>
					  <option value="Bizkaia">Bizkaia</option>
					  <option value="Araba">Araba</option>
					  <option value="Beste bat">Beste bat</option>
					</select>
					<div class="invalid-feedback">Aukeratu udalerria bat mesedez.</div>
				  </div>

				  <div class="mb-4">
					<label for="mezua" class="form-label">Zure mezua / azalpena</label>
					<textarea class="form-control" id="mezua" name="Mezua" rows="6" placeholder="Idatzi hemen zure mezua..." required></textarea>
					<div class="invalid-feedback">Mezua idatzi behar duzu.</div>
				  </div>

				  <button type="submit" class="btn btn-primary">Bidali</button>
				</form>
